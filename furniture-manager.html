<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniture Manager - Hatimi Hardware</title>
    <style>
        :root { --primary-gold: #b38728; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; }

        .search-container { background: white; padding: 15px 0; display: flex; justify-content: center; border-bottom: 1px solid #ddd; position: sticky; top: 0; z-index: 1000; }
        .search-box { width: 90%; max-width: 700px; padding: 12px 25px; border: 1.5px solid var(--primary-gold); border-radius: 50px; font-size: 16px; outline: none; }

        .main-wrapper { max-width: 1300px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.06); }
        .catalog-header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 3px solid var(--primary-gold); margin-bottom: 20px; }
        .logo-img { height: 80px !important; width: auto; display: block; object-fit: contain; }
        .brand-name { margin: 0; font-size: 28px; font-weight: 800; color: #b38728; text-transform: uppercase; }
        
        .category-header { background: #222; color: #fff; padding: 12px 20px; font-size: 18px; font-weight: 700; text-transform: uppercase; margin-top: 30px; border-left: 8px solid var(--primary-gold); border-radius: 4px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 15px 0; }
        @media (min-width: 768px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 1024px) { .product-grid { grid-template-columns: repeat(5, 1fr); gap: 15px; } }

        .product-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; text-align: center; position: relative; transition: all 0.3s ease; display: flex; flex-direction: column; justify-content: space-between; height: 300px; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.08); border-color: var(--primary-gold); }

        .btn-delete { position: absolute; top: 10px; right: 10px; border: none; background: #fee2e2; padding: 6px; border-radius: 4px; cursor: pointer; z-index: 10; }

        .img-holder { height: 130px; width: 100%; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; background: #fbfbfb; border-radius: 8px; overflow: hidden; }
        .img-holder img { max-height: 110px; max-width: 90%; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.05)); }

        .brand-tag { font-size: 11px; letter-spacing: 1px; font-weight: 900; color: #b38728; text-transform: uppercase; margin-top: 5px; }
        .item-name { font-size: 15px; font-weight: 700; color: #1e293b; margin-bottom: 10px; height: 40px; display: flex; align-items: center; justify-content: center; }

        .btn-view { background: var(--primary-gold); color: white; padding: 12px; border-radius: 8px; font-weight: bold; border: none; margin-top: auto; width: 100%; cursor: pointer; text-transform: uppercase; }

        .side-controls { position: fixed; bottom: 30px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 5000; }
        .ctrl-btn { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-logout { background: linear-gradient(135.5deg, #444 0%, #222 100%); color: #fff; border: none; padding: 12px 24px; border-radius: 50px; font-weight: 700; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .btn-add { background: #222; color: white; font-size: 32px; }

        .modal { display: none; position: fixed; z-index: 9999 !important; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
        .modal-content { background: white; width: 95%; max-width: 600px; padding: 25px; border-radius: 15px; position: relative; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 15px; top: 10px; font-size: 30px; cursor: pointer; color: #888; z-index: 10001; }
        
        .modal-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .modal-table td { vertical-align: middle; padding: 12px 8px; }
        .action-icon { cursor: pointer; padding: 5px; border-radius: 4px; display: inline-flex; }
        .edit-icon { color: #b38728; margin-right: 10px; }
        .delete-row-icon { color: #e74c3c; }

        .modal-backdrop { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); z-index: 9998; }
        #addProductModal { display: none; position: fixed; z-index: 9999; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 440px; background: #ffffff; padding: 30px; border-radius: 16px; }
        .input-group { margin-bottom: 16px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
        .input-group input, .input-group select { width: 100%; padding: 12px 16px; border: 1.5px solid #e2e8f0; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        
        .confirm-modal { display: none; position: fixed; z-index: 20000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; }
        .confirm-content { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        .btn-confirm { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-yes { background: #e74c3c; color: white; }
        .btn-no { background: #eee; color: #333; }
        /* RESTORED HOVER EFFECTS FOR SIDE BUTTONS */
        .btn-logout { transition: all 0.3s ease; }
        .btn-logout:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); 
            background: linear-gradient(135.5deg, #b38728 0%, #8e6a20 100%); 
        }

        .ctrl-btn { transition: all 0.3s ease; }
        .ctrl-btn:hover { 
            transform: scale(1.1); 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); 
        }
        
        .btn-add:hover { 
            background: var(--primary-gold); 
            color: white; 
            transform: scale(1.1) rotate(90deg); /* Adds a slick spin to the + icon */
        }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="inventory-search" class="search-box" placeholder="Search Furniture Inventory..." oninput="renderManagerCatalog(allProducts)">

<div class="main-wrapper">
    <header class="catalog-header">
        <div style="display:flex; align-items:center; gap:15px;">
            <img src="logo.png" class="logo-img" alt="Logo" onerror="this.src='https://placehold.co/80'">
            <div>
                <h1 class="brand-name">Hatimi Hardware</h1>
                <p style="margin:0; font-weight:bold; color:#666;">Furniture Inventory Control Panel</p>
            </div>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; cursor:pointer; font-size:26px; color:#b38728;">↻</button>

    <div id="catalog-container">Opening Furniture Inventory...</div>
</div>

<div class="side-controls">

    <button class="ctrl-btn btn-add" onclick="toggleAddModal()">+</button>
    <button id="backToTop" class="ctrl-btn" onclick="scrollToTop()" style="display:none; background:#b38728; color:white;">↑</button>

<div id="priceModal" class="modal" onclick="if(event.target == this) closeAllModals()">
    <div class="modal-content">
        <span class="close-modal" onclick="closeAllModals()">&times;</span>
        <h2 id="modalTitle" style="color: var(--primary-gold); margin-top: 10px;"></h2>
        <p id="modalBrand" style="font-weight: bold; color: #666; margin-bottom: 15px;"></p>
        <table class="modal-table">
            <thead>
                <tr style="text-align:left; border-bottom:2px solid #ddd;">
                    <th style="padding:10px;">Brand</th>
                    <th style="padding:10px;">Size / Specs</th>
                    <th style="padding:10px;">MRP (₹)</th>
                    <th style="padding:10px; text-align:right;">Actions</th>

            </thead>
            <tbody id="modalTableBody"></tbody>
        </table>
        <button onclick="closeAllModals()" class="btn-view" style="background:#eee; color:#333; margin-top:20px;">CLOSE WINDOW</button>
    </div>
</div>

<div id="customConfirmModal" class="confirm-modal">
    <div class="confirm-content">
        <div style="font-size: 50px; color: #e74c3c; margin-bottom: 15px;">⚠️</div>
        <h3 id="confirmTitle" style="margin:0; color:#222;">Are you sure?</h3>
        <p id="confirmText" style="color:#666; margin:10px 0;"></p>
        <div style="display: flex; gap: 10px; margin-top: 25px;">
            <button class="btn-confirm btn-no" onclick="closeConfirm()">Cancel</button>
            <button id="confirmYesBtn" class="btn-confirm btn-yes">Yes, Delete</button>

<script>
// !!! INSERT YOUR GOOGLE APPS SCRIPT URL HERE !!!
const webAppUrl = 'https://script.google.com/macros/s/AKfycbwLrnglavUsq7YuD4aLNnVWDOaCYc_S_PqJ6auy9j7pKWg8YfKNYF1qaUnrQLKfeHxH/exec';

let allProducts = [], uniqueBrands = [], uniqueNames = [];
let deleteTimeout = null, lastDeletedData = null;

function loadManagerData() {
    const container = document.getElementById('catalog-container');
    container.innerHTML = "<div style='text-align:center; padding:50px; font-weight:bold; color:#b38728;'>Opening Furniture Inventory...</div>";
    const script = document.createElement('script');
    script.src = `${webAppUrl}?callback=handleGoogleResponse&t=${Date.now()}`;
    script.onerror = () => container.innerHTML = "<p style='text-align:center; color:red; padding:50px;'>Connection Error. Please check WebApp URL.</p>";
    document.body.appendChild(script);
}

function handleGoogleResponse(response) {
    let rawData = [];
    if (Array.isArray(response)) { rawData = response; } 
    else if (response && response.data) { rawData = response.data; }

    // MAPS EXACTLY TO YOUR APPS SCRIPT DATA
    allProducts = rawData.map(entry => ({
        cat: String(entry['category'] || ""),
        brand: String(entry['brand'] || ""),
        name: String(entry['product name'] || ""),
        specs: String(entry['specifications'] || ""),
        mrp: String(entry['mrp'] || "")
    }));
    
    populateCats(allProducts);
    populateSuggestions(allProducts);
    renderManagerCatalog(allProducts); 
}

async function renderManagerCatalog(products) {
    const container = document.getElementById('catalog-container');
    if (!container) return;

    const searchTerm = document.getElementById('inventory-search')?.value.toLowerCase() || "";
    const seen = new Set();
    let currentCat = "";
    let html = "";

    const filtered = products.filter(p => 
        p.name.toLowerCase().includes(searchTerm) || 
        p.brand.toLowerCase().includes(searchTerm) || 
        p.cat.toLowerCase().includes(searchTerm)
    );

    filtered.sort((a, b) => a.cat.localeCompare(b.cat));

    for (const p of filtered) {
        const catName = String(p.cat || "").trim();
        const catLower = catName.toLowerCase();
        const isAutoHinge = catLower.includes("auto hinge");
        const isHandle = catLower.includes("handle");

        const key = isAutoHinge ? `${catName}|${p.name}|${p.specs}` : `${catName}|${p.name}|${p.brand}`;
        
        if (!seen.has(key)) {
            if (catName !== currentCat) {
                if (html !== "") html += `</div></div>`; 
                currentCat = catName;
                html += `
                <div class="category-group" style="margin-bottom: 40px;">
                    <h2 class="category-header">${currentCat}</h2>
                    <div class="product-grid">`; 
            }

            // 1. Clean all text for URLs
            const nClean = String(p.name).toLowerCase().trim().replace(/[,\s./_]+/g, '-');
            const sClean = String(p.specs).toLowerCase().trim().replace(/[,\s./_]+/g, '-');
            const bClean = String(p.brand).toLowerCase().trim().replace(/[,\s./_]+/g, '-');
            const cClean = String(p.cat).toLowerCase().trim().replace(/[,\s./_]+/g, '-');

            // 2. The Master Image Path Searcher
            const paths = isHandle 
                ? [
                    `furniture-img/${nClean}-combo.jpg`, 
                    `furniture-img/${nClean}.jpg`,
                    `furniture-img/${nClean}-combo.png`,
                    `furniture-img/${nClean}.png`
                  ] 
                : [
                    `furniture-img/${sClean}.jpg`,           // 1st choice: specs (0deg.jpg)
                    `furniture-img/${bClean}-${nClean}.jpg`, // 2nd choice: brand-name (godrej-auto-hinge.jpg)
                    `furniture-img/${cClean}-${nClean}.jpg`, // 3rd choice: cat-name (auto-hinges-auto-hinge.jpg)
                    `furniture-img/${nClean}.jpg`,           // 4th choice: name only (auto-hinge.jpg)
                    `furniture-img/${sClean}.png`,           // (And check for PNGs)
                    `furniture-img/${bClean}-${nClean}.png`,
                    `furniture-img/${nClean}.png`
                  ];
            const imgId = `img-${Math.random().toString(36).substr(2, 5)}`;
            const encN = encodeURIComponent(p.name);
            const encC = encodeURIComponent(catName);
            const encP = isAutoHinge ? encodeURIComponent(p.specs) : encodeURIComponent(p.brand);
            const cardId = `card-${Math.random().toString(36).substr(2, 9)}`; // Unique ID for animations

            html += `
            <div class="product-card" id="${cardId}" style="transition: transform 0.3s, opacity 0.3s;">
                <button onclick="deleteProductGroup('${encN}', '${encC}', '${encP}', ${isAutoHinge}, '${cardId}')" class="btn-delete" title="Delete Product Group">
                    <img src="https://cdn-icons-png.flaticon.com/512/1214/1214428.png" style="width: 14px;">
                </button>
                <div class="img-holder">
                    <img id="${imgId}" src="https://placehold.co/150x150?text=...">
                </div>
                <div class="card-info">
                    <div class="brand-tag">${isAutoHinge ? 'SPEC' : p.brand}</div>
                    <div class="item-name">${isAutoHinge ? p.specs : p.name}</div>
                </div>
                <button class="btn-view" onclick="openModal('${encN}', '${encC}', '${encP}', ${isAutoHinge})">
                    EDIT / VIEW
                </button>
            </div>`;

            setTimeout(() => { if(typeof tryLoadImage === 'function') tryLoadImage(imgId, paths, p.name); }, 20);
            seen.add(key);
        }
    }
    container.innerHTML = html !== "" ? html + "</div></div>" : "<p style='text-align:center; padding:50px; font-weight:bold; color:#999;'>No items found matching your search.</p>";
}

function tryLoadImage(idOrElement, urls) {
    // FIX: Tells the code to actually go find the image on the screen using the ID
    const imgElement = typeof idOrElement === 'string' ? document.getElementById(idOrElement) : idOrElement;
    
    if (!imgElement) return;
    let index = 0;
    
    function attemptLoad() {
        if (index < urls.length) {
            const imgTester = new Image();
            imgTester.onload = () => { imgElement.src = urls[index-1]; };
            imgTester.onerror = attemptLoad;
            imgTester.src = urls[index++];
        } else { 
            imgElement.src = 'https://placehold.co/150x150?text=No+Photo'; 
        }
    }
    attemptLoad();
}

function openModal(encN, encC, encP, isAutoHinge) {
    const name = decodeURIComponent(encN);
    const cat = decodeURIComponent(encC);
    const param = decodeURIComponent(encP);
    
    document.getElementById('modalTitle').innerText = name;
    document.getElementById('modalBrand').innerText = isAutoHinge ? param : cat;
    
    const tableHeader = document.querySelector('.modal-table thead tr th:first-child');
    if(tableHeader) tableHeader.innerText = "Brand";
    
    const tbody = document.getElementById('modalTableBody');
    tbody.innerHTML = "";

    const variants = allProducts.filter(p => {
        const matchName = String(p.name).trim().toLowerCase() === name.trim().toLowerCase();
        const matchCat = String(p.cat).trim().toLowerCase() === cat.trim().toLowerCase();
        const matchParam = isAutoHinge ? String(p.specs).trim().toLowerCase() === param.trim().toLowerCase() : String(p.brand).trim().toLowerCase() === param.trim().toLowerCase();
        return matchName && matchCat && matchParam;
    });

    let collectedSizes = [];
    variants.forEach((v, idx) => {
        String(v.specs || "").split(/[,،\n|]+/).forEach((singleSize, sIdx) => {
            if (singleSize.trim() !== "") {
                const priceList = String(v.mrp || "0").split(/[,،\n|]+/);
                const matchedPrice = priceList[sIdx] ? priceList[sIdx].trim() : priceList[0].trim();
                collectedSizes.push({ brand: v.brand || "No Brand", cleanS: singleSize.trim(), v: v, matchedMRP: matchedPrice, rowId: `row-${idx}-${sIdx}` });
            }
        });
    });

    collectedSizes.sort((a, b) => {
        const bCmp = a.brand.localeCompare(b.brand);
        if (bCmp !== 0) return bCmp;
        return a.cleanS.localeCompare(b.cleanS, undefined, { numeric: true, sensitivity: 'base' });
    });

    const shownKeys = new Set();
    collectedSizes.forEach(item => {
        const uniqueKey = `${item.brand}-${item.cleanS}`;
        if (!shownKeys.has(uniqueKey)) {
            const encB = encodeURIComponent(item.brand).replace(/'/g, "%27");
            const encN2 = encodeURIComponent(item.v.name).replace(/'/g, "%27");
            const encS = encodeURIComponent(item.cleanS).replace(/'/g, "%27");
            const safeMRP = String(item.matchedMRP || "0");

            tbody.innerHTML += `
            <tr id="${item.rowId}" style="border-bottom:1px solid #eee; transition: opacity 0.3s;">
                <td style="padding:12px; color:#b38728; font-weight:800; font-size:11px; text-transform:uppercase;">${item.brand}</td>
                <td class="size-cell" style="padding:12px; font-weight:700;">${item.cleanS}</td>
                <td class="mrp-cell" style="padding:12px; color: #b38728; font-weight:bold;">₹${safeMRP}</td>
                <td style="text-align: right;">
                    <span class="action-icon edit-icon" onclick="makeEditable('${item.rowId}', '${encB}', '${encN2}', '${encS}', '${safeMRP}')"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z"/></svg></span>
                    <span class="action-icon delete-row-icon" onclick="deleteRowSafe('${encB}', '${encN2}', '${encS}', '${item.rowId}')"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19V4M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg></span>
                </td>
            </tr>`;
            shownKeys.add(uniqueKey);
        }
    });
    document.getElementById('priceModal').style.display = "flex";
}

function makeEditable(rowId, encB, encN, encS, oldMrp) {
    const row = document.getElementById(rowId), oldSize = decodeURIComponent(encS), safeInput = oldSize.replace(/"/g, '&quot;');
    row.querySelector('.size-cell').innerHTML = `<input type="text" id="edit-size-${rowId}" value="${safeInput}" style="width:100px; padding:6px; border:2px solid #b38728; border-radius:4px; font-weight:bold;">`;
    row.querySelector('.mrp-cell').innerHTML = `₹<input type="number" id="edit-mrp-${rowId}" value="${oldMrp}" style="width:70px; padding:6px; border:2px solid #16a34a; border-radius:4px; font-weight:bold;">`;
    row.querySelector('td:last-child').innerHTML = `
        <button type="button" onclick="saveInLine('${rowId}', '${encB}', '${encN}', '${encS}')" style="background:#10b981; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer; font-weight:bold; font-size:11px;">SAVE</button>
        <button type="button" onclick="cancelEditSafe('${rowId}', '${encS}', '${oldMrp}', '${encB}', '${encN}')" style="background:#94a3b8; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer; margin-left:5px; font-size:11px;">X</button>`;
}

async function saveInLine(rowId, encB, encN, encS) {
    const row = document.getElementById(rowId);
    const newSize = document.getElementById(`edit-size-${rowId}`).value;
    const newMrp = document.getElementById(`edit-mrp-${rowId}`).value;
    const brand = decodeURIComponent(encB), name = decodeURIComponent(encN), oldSize = decodeURIComponent(encS);
    
    row.querySelector('td:last-child').innerHTML = `<span style="color:#b38728; font-weight:bold; font-size:11px;">SYNCING...</span>`;

    fetch(webAppUrl, { 
        method: "POST", mode: "no-cors", 
        body: JSON.stringify({ action: "updateRow", brand: brand, name: name, oldSize: oldSize, newSize: newSize, newPrice: newMrp })
    }).then(() => {
        row.querySelector('.size-cell').innerText = newSize; 
        row.querySelector('.mrp-cell').innerText = "₹" + newMrp;
        cancelEditSafe(rowId, encodeURIComponent(newSize).replace(/'/g, "%27"), newMrp, encB, encN);
        showToast("Changes saved", "success");
        
        allProducts.forEach(p => { 
            if(p.brand === brand && p.name === name && String(p.specs).includes(oldSize)) { 
                p.specs = p.specs.replace(oldSize, newSize); 
                p.mrp = String(p.mrp).replace(oldMrp, newMrp); 
            } 
        });
    });
}

function cancelEditSafe(rowId, encS, oldMrp, encB, encN) {
    const row = document.getElementById(rowId);
    row.querySelector('.size-cell').innerText = decodeURIComponent(encS); 
    row.querySelector('.mrp-cell').innerText = "₹" + oldMrp;
    row.querySelector('td:last-child').innerHTML = `
        <span class="action-icon edit-icon" onclick="makeEditable('${rowId}', '${encB}', '${encN}', '${encS}', '${oldMrp}')"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.87,8.87M3,17.25V21H6.75L17.81,9.93L14.06,6.18L3,17.25Z"/></svg></span>
        <span class="action-icon delete-row-icon" onclick="deleteRowSafe('${encB}', '${encN}', '${encS}', '${rowId}')"><svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19V4M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg></span>`;
}

// FULLY RESTORED: UNDO LOGIC WITH ANIMATIONS
function showUndoToast(message, actionData) {
    if (deleteTimeout) executeFinalDelete();
    lastDeletedData = actionData;
    
    let toast = document.getElementById("undoToast");
    if(!toast) {
        toast = document.createElement('div'); 
        toast.id = "undoToast"; 
        toast.className = `toast-msg`;
        document.body.appendChild(toast);
    }
    
    toast.innerHTML = `<span style="margin-right: 15px;">${message}</span><span class="undo-link" onclick="undoAction()">UNDO</span><div class="toast-timer"><div class="toast-progress"></div></div>`;
    toast.style.display = "flex";
    toast.style.background = "#334155";
    
    deleteTimeout = setTimeout(() => executeFinalDelete(), 5000);
}

function undoAction() {
    clearTimeout(deleteTimeout); 
    deleteTimeout = null; 
    document.getElementById('undoToast').style.display = "none";
    
    if (lastDeletedData.type === 'full') { 
        const card = document.getElementById(lastDeletedData.cardId);
        if(card) {
            card.style.display = 'flex'; 
            setTimeout(() => { card.style.transform = "scale(1)"; card.style.opacity = "1"; }, 10);
        }
    } else { 
        const row = document.getElementById(lastDeletedData.id); 
        if(row) {
            row.style.display = 'table-row'; 
            setTimeout(() => { row.style.opacity = "1"; }, 10);
        }
    }
    lastDeletedData = null; 
    showToast("Restored successfully!", "success");
}

async function executeFinalDelete() {
    const toast = document.getElementById('undoToast'); 
    if (toast) toast.style.display = "none";
    if (!lastDeletedData) return;
    
    const payload = { 
        action: lastDeletedData.type === 'full' ? "deleteEntireProduct" : "deleteSingleSize", 
        brand: lastDeletedData.brand, 
        name: lastDeletedData.name, 
        size: lastDeletedData.size 
    };
    
    fetch(webAppUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    showToast("Deleted from Database", "success");
    lastDeletedData = null; 
    deleteTimeout = null;
}

function deleteRowSafe(encB, encN, encS, rowId) {
    const size = decodeURIComponent(encS);
    askBeforeDelete("Remove Size?", `Remove "${size}"?`, () => {
        const row = document.getElementById(rowId); 
        if(row) {
            row.style.opacity = '0';
            setTimeout(() => { row.style.display = 'none'; }, 300); // Smooth fade
        }
        showUndoToast("Size removed", { type: 'row', brand: decodeURIComponent(encB), name: decodeURIComponent(encN), size: size, id: rowId });
    });
}

function deleteProductGroup(encN, encC, encP, isAutoHinge, cardId) {
    const prodName = decodeURIComponent(encN);
    const param = decodeURIComponent(encP);
    
    askBeforeDelete("Delete Entire Product?", `This will delete every variant of <b>${prodName}</b>.`, () => {
        const card = document.getElementById(cardId);
        if(card) {
            card.style.transform = "scale(0.9)";
            card.style.opacity = "0";
            setTimeout(() => { card.style.display = 'none'; }, 300); // Smooth shrink and fade
        }
        
        const brandForDb = isAutoHinge ? "N/A" : param; 
        showUndoToast("Product group removed", { type: 'full', brand: brandForDb, name: prodName, cardId: cardId });
    });
}

// UTILITIES
function showToast(message, type = 'success') {
    let toast = document.getElementById("pro-toast");
    if (!toast) {
        toast = document.createElement("div");
        toast.id = "pro-toast";
        toast.style.cssText = `position: fixed; bottom: 30px; right: 30px; padding: 16px 24px; border-radius: 8px; font-weight: bold; color: white; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 9999; transition: 0.3s; opacity: 0; transform: translateY(20px);`;
        document.body.appendChild(toast);
    }
    toast.style.background = type === 'error' ? "#ef4444" : "#10b981";
    toast.innerHTML = message;
    
    setTimeout(() => { toast.style.opacity = "1"; toast.style.transform = "translateY(0)"; }, 10);
    setTimeout(() => { toast.style.opacity = "0"; toast.style.transform = "translateY(20px)"; }, 2500);
}

function askBeforeDelete(title, text, action) {
    document.getElementById('confirmTitle').innerText = title; 
    document.getElementById('confirmText').innerHTML = text; 
    document.getElementById('customConfirmModal').style.display = 'flex';
    document.getElementById('confirmYesBtn').onclick = () => { action(); closeConfirm(); };
}

function closeConfirm() { document.getElementById('customConfirmModal').style.display = 'none'; }

function populateCats(products) {
    const catSelect = document.getElementById('newCat'); 
    if (!catSelect) return;
    const categories = [...new Set(products.map(p => p.cat))].filter(c => c).sort();
    catSelect.innerHTML = '<option value="">Select Category</option>' + categories.map(c => `<option value="${c}">${c}</option>`).join('') + '<option value="ADD_NEW" style="color:#d4af37; font-weight:bold;">+ Add New Category</option>';
    catSelect.onchange = function() {
        if (this.value === "ADD_NEW") { const nCat = prompt("New Category Name:"); if (nCat) { const opt = document.createElement('option'); opt.value = nCat; opt.text = nCat; this.add(opt, this.options[this.length - 1]); this.value = nCat; } else this.value = ""; }
    };
}

// RESTORED: SUGGESTIONS LOGIC WITH CLICK-OUTSIDE
function populateSuggestions(products) {
    uniqueBrands = [...new Set(products.map(p => String(p.brand || "").trim()))].filter(b => b && b !== "N/A").sort();
    uniqueNames = [...new Set(products.map(p => String(p.name || "").trim()))].filter(n => n && n !== "Unnamed").sort();
}

function showSuggestions(input, type) {
    const val = input.value.toLowerCase();
    const container = document.getElementById(type === 'brand' ? 'brandSuggestions' : 'nameSuggestions');
    const list = type === 'brand' ? uniqueBrands : uniqueNames;
    
    container.innerHTML = ""; 
    if (!val) { container.style.display = "none"; return; }
    
    const filtered = list.filter(item => item.toLowerCase().includes(val));
    if (filtered.length > 0) {
        container.style.display = "block";
        filtered.forEach(item => { 
            const div = document.createElement('div'); 
            div.className = 'suggestion-item'; 
            div.innerText = item; 
            div.onclick = () => { input.value = item; container.style.display = "none"; }; 
            container.appendChild(div); 
        });
    } else container.style.display = "none";
}

document.addEventListener('click', e => { 
    if (!e.target.matches('input')) document.querySelectorAll('.suggestion-container').forEach(c => c.style.display = "none"); 
});

// RESTORED: FULL IMAGE UPLOAD LOGIC
async function handleAddProduct(event) {
    event.preventDefault(); 
    const btn = document.getElementById('submitBtn'); 
    btn.innerText = "SAVING..."; btn.disabled = true;
    try {
        const fileInput = document.getElementById('new-product-file'); 
        let fileData = "", mimeType = "", filename = "";
        
        if (fileInput && fileInput.files.length > 0) {
            const file = fileInput.files[0]; 
            const reader = new FileReader();
            fileData = await new Promise(res => { 
                reader.onload = e => res(e.target.result.split(',')[1]); 
                reader.readAsDataURL(file); 
            });
            mimeType = file.type; 
            filename = file.name;
        }
        
        const payload = { 
            action: fileData ? "addWithImage" : "add", 
            cat: document.getElementById('newCat').value, 
            brand: document.getElementById('newBrand').value || "N/A", 
            name: document.getElementById('newName').value, 
            specs: document.getElementById('newSpecs').value, 
            mrp: document.getElementById('newMrp').value,
            fileData: fileData, 
            mimeType: mimeType, 
            filename: filename 
        };
        
        await fetch(webAppUrl, { 
            method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' }, 
            body: JSON.stringify(payload) 
        });
        
        showToast("Product added!", "success"); 
        document.getElementById('addProductForm').reset(); 
        closeAllModals(); 
        setTimeout(loadManagerData, 2000);
    } catch (error) { 
        showToast("Failed to save.", "error"); 
    } finally { 
        btn.innerText = "Add to Inventory"; btn.disabled = false; 
    }
}

function logout() { sessionStorage.removeItem('managerAuth'); window.location.href = "index.html"; }
function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }
window.onscroll = () => document.getElementById("backToTop").style.display = (window.scrollY > 300) ? "flex" : "none";
function toggleAddModal() { const m = document.getElementById('addProductModal'), b = document.getElementById('modalBackdrop'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; b.style.display = b.style.display === 'block' ? 'none' : 'block'; }
function closeAllModals() { document.getElementById('priceModal').style.display = 'none'; document.getElementById('addProductModal').style.display = 'none'; document.getElementById('modalBackdrop').style.display = 'none'; document.body.style.overflow = 'auto'; }

loadManagerData();
</script>
